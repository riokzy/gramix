name: Bug Report
description: Report unexpected behaviour or a crash in gramix
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: gramix version
      placeholder: "e.g. 0.1.3"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.5"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the problem.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproducible example
      description: The shortest code that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happens? Paste the full traceback if available.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help (OS, deployment environment, etc.)
